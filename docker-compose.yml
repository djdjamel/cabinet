services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qr_cabinet}
      POSTGRES_USER: ${POSTGRES_USER:-qr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qr_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-qr_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qr_cabinet}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
    ports:
      - "3000:3000"

  # Optionnel : tunnel Cloudflare pour accès patients en 4G sans IP publique
  # Activer en définissant CLOUDFLARE_TUNNEL_TOKEN dans .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      - app

volumes:
  postgres_data:
